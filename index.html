<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒詞彙互動遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="jsContent">
 
</div>
<div id="start-screen">
    <div class="start-content">
        <h1>情緒解壓縮</h1>
        <p>傾斜手機即可控制情緒球流動</p>
        <button id="start-btn">開始解壓</button>
    </div>
</div>

   <div class="stat-box">
    <!-- 累積消滅區塊 -->
    <div class="total-section">
        <div class="total-label">總共消滅了</div>
        <span id="global-count">0</span>
        <span class="total-unit">個壓力</span>
    </div>
    
    <!-- 細項指數區塊 -->
    <div class="details-section">
        <div class="stat-item">
            <span class="dot red"></span>
            <span class="label">高壓（焦慮/疲憊）：</span>
            <span id="count-red">0</span>
        </div>
        <div class="stat-item">
            <span class="dot green"></span>
            <span class="label">平穩情緒：</span>
            <span id="count-green">0</span>
        </div>
        <div class="stat-item">
            <span class="dot yellow"></span>
            <span class="label">執行高能：</span>
            <span id="count-yellow">0</span>
        </div>
    </div>
</div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
