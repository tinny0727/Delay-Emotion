<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒詞彙互動遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-icon">
  Hi 👋
</div>
    <img src="image/逃避.png" alt="逃避">
    <div id="ui">
        <h1>Delay Emotion</h1>
        <h2>今天過得怎麼樣？一起把情緒塗滿吧！</h2>
        
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 10px 0;">
        
        <div class="stat-box">
            <div class="stat-item"><span class="dot red"></span> 高壓（焦慮/疲憊）：<span id="count-red">0</span></div>
            <div class="stat-item"><span class="dot green"></span> 高能 (黃金期/任務執行)：<span id="count-green">0</span></div>
            <div class="stat-item"><span class="dot yellow"></span> 平穩：<span id="count-yellow">0</span></div>
        </div>
        
        <div id="analysis">點擊球體開始分析情緒...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
